<!--
  Custom structured data (JSON-LD / schema.org).

  Chirpy + jekyll-seo-tag already emit a per-page node (BlogPosting on posts,
  WebSite on the home page). This hook ADDS what seo-tag does not:

    - a canonical Person identity (with sameAs links) shared by @id
    - a WebSite node tied to that Person as author/publisher
    - a BreadcrumbList on post pages (Home > Category > Post)

  Values are pulled from _config.yml (site.social.*) so there is nothing to
  hardcode here. Person/WebSite carry explicit @id so crawlers merge them
  across pages; types here never collide with seo-tag's output.
-->
{%- assign person_id = site.url | append: '/#person' -%}
{%- assign site_id = site.url | append: '/#website' -%}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@graph": [
    {
      "@type": "Person",
      "@id": {{ person_id | jsonify }},
      "name": {{ site.social.name | jsonify }},
      "url": {{ site.url | jsonify }},
      "jobTitle": "Full-stack Developer",
      "description": {{ site.description | jsonify }}
      {%- if site.social.links and site.social.links.size > 0 -%}
      ,
      "sameAs": [
        {%- for link in site.social.links -%}
        {{ link | jsonify }}{%- unless forloop.last -%},{%- endunless -%}
        {%- endfor -%}
      ]
      {%- endif -%}
    },
    {
      "@type": "WebSite",
      "@id": {{ site_id | jsonify }},
      "url": {{ site.url | jsonify }},
      "name": {{ site.title | jsonify }},
      "description": {{ site.description | jsonify }},
      "inLanguage": "ko-KR",
      "author": { "@id": {{ person_id | jsonify }} },
      "publisher": { "@id": {{ person_id | jsonify }} }
    }
    {%- if page.layout == 'post' -%}
    ,
    {
      "@type": "BreadcrumbList",
      "itemListElement": [
        {
          "@type": "ListItem",
          "position": 1,
          "name": "Home",
          "item": {{ site.url | jsonify }}
        }
        {%- if page.categories and page.categories.size > 0 -%}
        ,
        {
          "@type": "ListItem",
          "position": 2,
          "name": {{ page.categories.last | jsonify }}
        }
        {%- endif -%}
        ,
        {
          "@type": "ListItem",
          "position": {% if page.categories and page.categories.size > 0 %}3{% else %}2{% endif %},
          "name": {{ page.title | jsonify }},
          "item": {{ page.url | absolute_url | jsonify }}
        }
      ]
    }
    {%- endif -%}
  ]
}
</script>
